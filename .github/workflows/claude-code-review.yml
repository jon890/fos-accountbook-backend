name: Claude Code Review

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'claude[bot]' && (
        github.event_name == 'pull_request' ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request != null &&
         contains(github.event.comment.body, '/review'))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Minimize old Claude bot comments
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ env.PR_NUMBER }}"

          # 이전 일반 PR 코멘트 숨기기
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | .node_id' \
            | while read -r node_id; do
              if [ -n "$node_id" ]; then
                echo "Minimizing outdated Claude comment: $node_id"
                gh api graphql -f query='
                  mutation($id: ID!) {
                    minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                      minimizedComment { isMinimized }
                    }
                  }' -f id="$node_id" || true
              fi
            done

          # 이전 인라인 리뷰 코멘트 숨기기
          gh api "repos/$REPO/pulls/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | .node_id' \
            | while read -r node_id; do
              if [ -n "$node_id" ]; then
                echo "Minimizing outdated Claude inline comment: $node_id"
                gh api graphql -f query='
                  mutation($id: ID!) {
                    minimizeComment(input: {subjectId: $id, classifier: OUTDATED}) {
                      minimizedComment { isMinimized }
                    }
                  }' -f id="$node_id" || true
              fi
            done

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are a code review orchestrator for the fos-accountbook-backend project (Spring Boot family budget API).
            Your job is to coordinate 4 parallel specialist reviewers, then post a single GitHub review.

            ## Step 1: Fetch PR Data

            Run these commands first (build tooling excluded from diff to reduce noise):
            ```
            gh pr diff ${{ env.PR_NUMBER }} --repo ${{ github.repository }} -- ':!gradle/' ':!gradlew' ':!gradlew.bat' ':!*.lock'
            gh pr view ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --json title,body,additions,deletions
            ```

            If the diff is empty after filtering, post a short approving review and stop.

            ## Finding Format (used by all agents)

            Each agent outputs findings in this exact structure:

            ```
            FINDING_START
            TYPE: INLINE or GENERAL
            SEVERITY: 🔴 or 🟡
            PATH: src/main/java/com/bifos/accountbook/...  (INLINE only — relative path matching diff)
            LINE: 42                                         (INLINE only — line number in new file)
            ISSUE: 문제 설명 (한국어)
            FIX: 수정 제안 (한국어)
            FINDING_END
            ```
            - `TYPE: INLINE` — exact file+line identified in diff
            - `TYPE: GENERAL` — spans multiple files or cannot be pinpointed
            - No issues → output: `NO_ISSUES`

            ## Step 2: Spawn 4 Parallel Specialist Agents

            Launch all 4 agents **simultaneously** using the Agent tool.
            **Each agent MUST use `model: "haiku"`** to minimize token usage.
            Pass the full filtered diff in each agent's prompt.

            ---

            **Agent 1 — Java Code Quality & Null Safety** (`model: "haiku"`)

            Prompt:
            ```
            You are a Java code quality specialist reviewer. Analyze this PR diff for Java code quality issues only.

            This is a Spring Boot project using Java 21, Lombok, QueryDSL, and JPA.

            PR DIFF:
            <insert full diff here>

            Check for:
            🔴 MUST FIX:
            - NullPointerException risk: returning null without Optional, accessing without null check
            - `orElse(null)` without null check after (use orElseThrow() or orElseGet())
            - Unchecked cast or raw type usage
            - Empty catch blocks or catch-and-print-only

            🟡 SHOULD FIX:
            - @Data on JPA entity (equals/hashCode infinite loop risk)
            - `new ArrayList<>()` where `List.of()` suffices (immutability)
            - Magic numbers/strings that should be constants
            - For loop replaceable with Stream API
            - Unnecessary type casting

            Output findings using the FINDING_START/FINDING_END format.
            If no issues, output: NO_ISSUES
            ```

            ---

            **Agent 2 — Project Conventions & Layer Architecture** (`model: "haiku"`)

            Prompt:
            ```
            You are a project conventions specialist. Analyze this PR diff for convention and architecture violations only.

            This project follows a strict layered architecture:
            presentation → application → domain → infra

            Package structure:
            - presentation: Controller, DTO (Request/Response)
            - application: Service, UseCase, DTO, AOP, Event
            - domain: Entity, Repository interface, Value Object
            - infra: Repository impl (JPA/QueryDSL), Filter, External services

            PR DIFF:
            <insert full diff here>

            🔴 MUST FIX:
            - Layer dependency violation: upper layer importing lower layer (e.g., domain importing application)
            - infra layer referencing presentation directly (skipping domain)
            - Controller injecting Repository directly
            - Domain Entity with non-business dependencies

            🟡 SHOULD FIX:
            - Method names not starting with a verb (save, find, update, delete, create...)
            - Controller handling business logic instead of delegating to Service
            - DTO class names missing Request/Response suffix
            - @Transactional on Controller instead of Service

            Output findings using the FINDING_START/FINDING_END format.
            If no issues, output: NO_ISSUES
            ```

            ---

            **Agent 3 — Security & Authorization** (`model: "haiku"`)

            Prompt:
            ```
            You are a security specialist. Analyze this PR diff for security issues only.

            This is a Spring Boot REST API with Spring Security. The project uses familyUuid-based ownership validation.
            All family-scoped resources must validate that the resource belongs to the requesting user's family.

            PR DIFF:
            <insert full diff here>

            🔴 MUST FIX:
            - Controller endpoint missing @LoginUser authentication
            - Endpoint modifying/deleting resource without familyUuid in path (no ownership validation)
            - IDOR vulnerability: accessing another user's resources
            - SQL injection: string concatenation in native queries (use QueryDSL parameters)
            - Sensitive data (passwords, tokens) in response DTO or logs
            - Admin-only functionality without @PreAuthorize or SecurityContext check

            🟡 SHOULD FIX:
            - Missing validation annotations (@Valid, @NotNull, @NotBlank)
            - Internal implementation details in error messages (stack traces, DB structure)
            - Returning 403 where 404 is more appropriate (information leakage)

            Output findings using the FINDING_START/FINDING_END format.
            If no issues, output: NO_ISSUES
            ```

            ---

            **Agent 4 — Spring Boot & JPA Architecture** (`model: "haiku"`)

            Prompt:
            ```
            You are a Spring Boot and JPA architecture specialist. Analyze this PR diff for Spring/JPA issues only.

            This project uses Spring Boot, Spring Data JPA, QueryDSL, and Repository pattern
            (domain interfaces implemented in infra layer).

            PR DIFF:
            <insert full diff here>

            🔴 MUST FIX:
            - Service method performing multiple DB operations without @Transactional (data consistency risk)
            - N+1 query: LAZY relation accessed inside a loop
            - @Data on @Entity (equals/hashCode/toString infinite loop via relations)
            - JPA Entity returned directly as Controller response (missing DTO conversion)
            - @Modifying query without transaction

            🟡 SHOULD FIX:
            - @Cacheable without corresponding @CacheEvict logic
            - QueryDSL Q-class instantiated with `new` instead of static import
            - Using findById() for existence check instead of existsBy...
            - Optional.get() direct call (use orElseThrow())
            - Bidirectional relation missing convenience method

            Output findings using the FINDING_START/FINDING_END format.
            If no issues, output: NO_ISSUES
            ```

            ## Step 3: Post Single GitHub Review

            After all 4 agents complete, collect and deduplicate all FINDING_START/FINDING_END blocks.

            Determine the review event:
            - If ANY 🔴 finding exists → `"REQUEST_CHANGES"`
            - Otherwise → `"APPROVE"`

            Build a single GitHub review containing:
            - `body`: summary of all findings (both INLINE and GENERAL)
            - `comments`: array of inline comments for TYPE: INLINE findings
            - `event`: APPROVE or REQUEST_CHANGES

            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/reviews \
              --method POST \
              --header "Content-Type: application/json" \
              --input - <<'REVIEW_EOF'
            {
              "event": "APPROVE or REQUEST_CHANGES",
              "body": "## 코드 리뷰 — [PR 제목 요약]\n\n[한 줄 전체 평가]\n\n---\n\n### 🔴 머스트 픽스\n\n...\n\n### 🟡 개선 권장\n\n...\n\n### 🟢 잘 된 점\n\n- ...\n\n---\n🤖 Reviewed with [Claude Code](https://claude.com/claude-code) (Sonnet orchestrator · Haiku specialists: Java Quality · Layer Architecture · Security · Spring/JPA)",
              "comments": [
                {
                  "path": "src/main/java/com/bifos/accountbook/example/ExampleController.java",
                  "line": 42,
                  "side": "RIGHT",
                  "body": "🔴 **문제**: ...\n\n**수정**: ..."
                }
              ]
            }
            REVIEW_EOF
            ```

            ## Review Body Format (Korean)

            ```
            ## 코드 리뷰 — [PR 제목 요약]

            [한 줄 전체 평가]

            ---

            ### 🔴 머스트 픽스 (있는 경우만)

            **파일명:라인** 문제: ... / 수정: ...

            ### 🟡 개선 권장 (있는 경우만)

            **파일명:라인** 문제: ... / 수정: ...

            ### 🟢 잘 된 점

            - ...

            ---
            🤖 Reviewed with [Claude Code](https://claude.com/claude-code) (Sonnet orchestrator · Haiku specialists: Java Quality · Layer Architecture · Security · Spring/JPA)
            ```

            ## Critical Rules

            - **Post exactly ONE review** — do not call the reviews API more than once
            - **Do NOT post a separate general comment** — the review body IS the summary
            - **Only include sections that have content** — omit empty 🔴 or 🟡 sections
            - **If zero issues found**, post APPROVE review with 🟢 section only, no comments array
            - **Be specific** — reference exact file names and line numbers
            - Format inline comment body as: `{SEVERITY} **문제**: {ISSUE}\n\n**수정**: {FIX}`
            - `path` must be relative (no leading `/`), exactly matching the diff
            - `line` must appear in the diff — if unsure, treat as GENERAL in the body
            - `side` is always `"RIGHT"`
            - If `gh api` returns 422, log the error and do NOT retry

          claude_args: '--model claude-sonnet-4-6 --allowedTools "Agent,Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)" --disallowedTools "Read,Write,Edit,Glob,Grep,LS"'
