name: Claude 코드 리뷰

on:
  pull_request:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      github.actor != 'dependabot[bot]' &&
      github.actor != 'claude[bot]' && (
        github.event_name == 'pull_request' ||
        (github.event_name == 'issue_comment' &&
         github.event.issue.pull_request != null &&
         contains(github.event.comment.body, '/review'))
      )
    runs-on: ubuntu-latest
    # 정상 리뷰는 5~10분 내 완료. claude-code-action 이 hang 하는 경우
    # (issue anthropics/claude-code-action#1290 등) GitHub Actions 기본 360분까지 대기되어
    # 이전 stuck run 이 1.5시간 동안 방치된 사고 발생 — job-level timeout 으로 자동 fail.
    timeout-minutes: 15
    env:
      PR_NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}
    # 같은 PR에 대해 동시에 실행 중인 이전 리뷰 run을 취소하여 중복 코멘트 방지
    concurrency:
      group: claude-review-${{ github.event.pull_request.number || github.event.issue.number }}
      cancel-in-progress: true
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
      checks: write

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      # /review 트리거 댓글에 👀 이모지로 즉시 작업 시작 시그널
      - name: /review 댓글에 시작 reaction 추가
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            --method POST \
            --field content=eyes || true

      # issue_comment 트리거된 workflow run 은 GitHub Actions 의 알려진 제약으로
      # PR Checks 탭에 자동 등록 안 됨. PR head SHA 에 Check Run 을 수동 생성하여
      # /review 진행 상태가 PR 페이지에서 가시화되도록 한다.
      - name: PR head SHA 조회 + Check Run 시작 (Checks 탭 노출)
        if: github.event_name == 'issue_comment'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          HEAD_SHA=$(gh pr view ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --json headRefOid --jq .headRefOid)
          echo "HEAD_SHA=$HEAD_SHA" >> "$GITHUB_ENV"

          CHECK_RUN_ID=$(gh api "repos/${{ github.repository }}/check-runs" \
            --method POST \
            --field name="Claude Code Review" \
            --field head_sha="$HEAD_SHA" \
            --field status="in_progress" \
            --field details_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}" \
            --jq .id)
          echo "CHECK_RUN_ID=$CHECK_RUN_ID" >> "$GITHUB_ENV"
          echo "Check Run 시작: id=$CHECK_RUN_ID head_sha=$HEAD_SHA"

      # 이전 봇 댓글 minimize 가 아닌 DELETE — minimized 블록 누적으로 PR 스레드가 지저분해지는
      # 사고 회피 (fos-blog 정착 패턴). 이력 보존은 GitHub event log 로 충분.
      - name: 이전 Claude 봇 댓글 삭제
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ env.PR_NUMBER }}"

          # 이전 일반 PR 코멘트 삭제 (claude[bot] 작성)
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | .id' \
            | while read -r comment_id; do
              if [ -n "$comment_id" ]; then
                echo "오래된 Claude 일반 댓글 삭제 중: $comment_id"
                gh api "repos/$REPO/issues/comments/$comment_id" --method DELETE || true
              fi
            done

          # 이전 인라인 리뷰 코멘트 삭제 (claude[bot] 작성)
          gh api "repos/$REPO/pulls/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | .id' \
            | while read -r comment_id; do
              if [ -n "$comment_id" ]; then
                echo "오래된 Claude 인라인 댓글 삭제 중: $comment_id"
                gh api "repos/$REPO/pulls/comments/$comment_id" --method DELETE || true
              fi
            done

      - name: Claude 코드 리뷰 실행 (단일 Opus agent)
        uses: anthropics/claude-code-action@v1.0.153
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "*"
          prompt: |
            당신은 fos-accountbook-backend 프로젝트의 코드 리뷰어입니다.

            ## 프로젝트 정보

            - Spring Boot 4, Java 21, JPA + QueryDSL, JWT 인증, Flyway 마이그레이션
            - 도메인 기반 패키지: presentation(Controller) → application(Service) → domain(Entity/Repository) → infra(JPA 구현)
            - Google Java Style + Naver Convention (Checkstyle 자동 검사)

            ## PR 데이터 수집

            ```
            gh pr diff ${{ env.PR_NUMBER }} --repo ${{ github.repository }} -- ':!gradle/wrapper/gradle-wrapper.jar' ':!*.lock' ':!build/' ':!*.class'
            gh pr view ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --json title,body,additions,deletions
            ```

            diff 가 비어 있으면 짧은 긍정 댓글을 게시하고 종료한다.

            ## 리뷰 관점 (4가지 축)

            ### 1. Java & JPA 정확성
            🔴 Entity @Data 사용, 쓰기 메서드 @Transactional 누락, AOP 자기 호출(@CacheEvict/@Transactional 같은 클래스 내 호출), BigDecimal == 비교, N+1 쿼리 위험
            🟡 Optional.get() 직접 호출, 와일드카드 import

            ### 2. 프로젝트 컨벤션
            🔴 System.out.println (Slf4j 필수), Controller 에서 Entity 직접 반환 (DTO 필수), 한국어 발음 식별자
            🟡 매직 넘버, DTO 에 Setter

            ### 3. 보안 & 권한
            🔴 가족 리소스에 familyUuid URL 누락, @ValidateFamilyAccess 누락, SQL Injection, 민감 정보 로깅
            🟡 @LoginUser 없이 사용자 식별, skipAuth endpoint 에서 민감 데이터 노출

            ### 4. 아키텍처 & Spring 패턴
            🔴 Controller→Repository 직접 주입, 레이어 역방향 의존성, 기존 Flyway 마이그레이션 수정
            🟡 Service 과다 의존, 테스트 @Transactional 사용, Service/Repository 모킹

            ## 출력

            ### 인라인 리뷰 (발견사항이 있을 때만)

            ```bash
            gh api repos/${{ github.repository }}/pulls/${{ env.PR_NUMBER }}/reviews \
              --method POST \
              --header "Content-Type: application/json" \
              --input - <<'REVIEW_EOF'
            {
              "event": "COMMENT",
              "comments": [
                {
                  "path": "src/main/java/.../SomeFile.java",
                  "line": 42,
                  "side": "RIGHT",
                  "body": "🔴 **문제**: ...\n\n**수정**: ..."
                }
              ]
            }
            REVIEW_EOF
            ```

            규칙:
            - `event` 는 항상 `"COMMENT"` (머지 차단 방지)
            - `path` 는 diff 와 정확히 매치되는 상대 경로
            - `line` 불확실하면 인라인 대신 요약에만 포함
            - 인라인 발견사항이 없으면 이 단계 skip

            ### 요약 댓글 (반드시 1개)

            ```bash
            gh pr comment ${{ env.PR_NUMBER }} --repo ${{ github.repository }} --body-file - <<'COMMENT_EOF'
            ## 코드 리뷰 [PR 제목 요약]

            [한 줄 전체 평가]

            ---

            ### 🔴 머지 전 필수 수정 (있는 경우만)

            **파일명 라인번호**
            문제: ...
            수정: ...

            ### 🟡 개선 권장 (있는 경우만)

            **파일명 라인번호**
            문제: ...
            수정: ...

            ### 🟢 잘 된 점

            - ...

            ---
            🤖 Reviewed with [Claude Code](https://claude.com/claude-code) (Opus)
            💬 인라인 코멘트는 **Files changed** 탭에서 확인하세요
            COMMENT_EOF
            ```

            ## 핵심 규칙

            - **PR 브랜치에 파일 생성/수정/커밋 금지** — read-only + GitHub API 호출만
            - **요약 댓글은 반드시 `--body-file -` HEREDOC 사용** — `--body "..."` 는 `\n` 이 깨짐
            - **일반 댓글은 정확히 1개만** — `gh pr comment` 두 번 이상 호출 금지
            - **이슈 0개면** 인라인 skip + 🟢 섹션만 있는 짧은 긍정 댓글
            - **비어 있는 🔴/🟡 섹션은 완전히 생략**
            - **테스트/더미/placeholder 댓글 게시 금지**

          claude_args: '--model claude-opus-4-7 --allowedTools "Bash" --disallowedTools "Agent,Read,Write,Edit,Glob,Grep,LS"'

      # 게시된 댓글 본문에 literal `\n` 두 글자가 박힌 경우 자동 보정.
      # 사고 패턴: Claude action 이 prompt 의 `--body-file - <<'COMMENT_EOF'` HEREDOC
      # 가이드를 무시하고 `gh pr comment --body "...\n..."` 호출 → shell 이 큰따옴표 안
      # `\n` 을 literal 두 글자로 GitHub API 에 전달 → 마크다운 렌더 시 줄바꿈 안 됨.
      # 실측 사고: PR #208 일반 댓글 (id 4412740228). jq contains("\\n") 으로 검출 후
      # perl 로 실제 newline 으로 교체, PATCH API 로 본문 갱신.
      - name: 게시된 댓글의 literal \n 두 글자 자동 보정
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ env.PR_NUMBER }}"

          fix_one() {
            local kind="$1"   # issues 또는 pulls
            local id="$2"
            local body
            body=$(gh api "repos/$REPO/$kind/comments/$id" --jq .body)
            if printf '%s' "$body" | grep -q '\\n'; then
              echo "[literal \\n 검출] $kind#$id 본문 보정 중..."
              local fixed
              fixed=$(printf '%s' "$body" | perl -pe 's/\\n/\n/g')
              gh api "repos/$REPO/$kind/comments/$id" --method PATCH \
                --field body="$fixed" >/dev/null || true
            fi
          }

          # 일반 PR 댓글 (issue comments)
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | select(.body | contains("\\n")) | .id' \
            | while read -r id; do
              [ -n "$id" ] && fix_one "issues" "$id"
            done

          # 인라인 리뷰 댓글 (PR review comments)
          gh api "repos/$REPO/pulls/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | select(.body | contains("\\n")) | .id' \
            | while read -r id; do
              [ -n "$id" ] && fix_one "pulls" "$id"
            done

      # 게시된 인라인 댓글 중 dummy / 길이 미달 / 마커 부재 entry 를 자동 정리
      # — Claude action 이 자연어 sanity check 를 무시하고 "test body" / "test2"
      # 같은 placeholder 를 게시하는 사고 (fos-blog PR #114 관측) 를 강제 차단.
      # always 실행해도 안전: 정상 댓글은 패턴에 매치 안 됨.
      - name: 게시된 인라인 댓글의 dummy / 미달 entry 자동 삭제
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          REPO="${{ github.repository }}"
          PR_NUMBER="${{ env.PR_NUMBER }}"

          # claude[bot] 가 작성한 인라인 댓글만 검사
          gh api "repos/$REPO/pulls/$PR_NUMBER/comments" \
            --jq '.[] | select(.user.login == "claude[bot]") | "\(.id)\t\(.body)"' \
            | while IFS=$'\t' read -r comment_id body; do
              [ -z "$comment_id" ] && continue

              # 정리 조건 (하나라도 만족하면 삭제):
              # 1) 본문 길이 12자 미만
              # 2) /^test\s*\d*$/i 같은 단순 placeholder (test, test1, test 2, sample, foo 등)
              # 3) 🔴 / 🟡 severity 마커 부재 (정상 review 형식 미준수)
              len=${#body}
              should_delete=0

              if [ "$len" -lt 12 ]; then
                should_delete=1
              elif printf '%s' "$body" | grep -qiE '^(test|sample|placeholder|foo|bar|example)[[:space:]]*[0-9]*$'; then
                should_delete=1
              elif ! printf '%s' "$body" | grep -qE '🔴|🟡'; then
                should_delete=1
              fi

              if [ "$should_delete" = "1" ]; then
                echo "dummy 인라인 댓글 자동 삭제: id=$comment_id body=\"$body\""
                gh api "repos/$REPO/pulls/comments/$comment_id" --method DELETE || true
              fi
            done

      # 작업 결과를 /review 댓글에 ✅/❌ reaction 으로 표시 (success/failure 분기, always 실행)
      - name: /review 댓글에 종료 reaction 추가
        if: github.event_name == 'issue_comment' && always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTCOME: ${{ job.status }}
        run: |
          # job.status: success | failure | cancelled
          if [ "$OUTCOME" = "success" ]; then
            CONTENT="+1"
          else
            CONTENT="-1"
          fi
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            --method POST \
            --field content="$CONTENT" || true

      # Check Run 완료 처리 — job.status 를 conclusion 으로 매핑 (PR Checks 탭에서 즉시 결과 가시화)
      - name: Check Run 완료 처리 (success/failure/cancelled)
        if: github.event_name == 'issue_comment' && always() && env.CHECK_RUN_ID != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OUTCOME: ${{ job.status }}
        run: |
          case "$OUTCOME" in
            success)   CONCLUSION="success" ;;
            failure)   CONCLUSION="failure" ;;
            cancelled) CONCLUSION="cancelled" ;;
            *)         CONCLUSION="failure" ;;
          esac

          gh api "repos/${{ github.repository }}/check-runs/${{ env.CHECK_RUN_ID }}" \
            --method PATCH \
            --field status="completed" \
            --field conclusion="$CONCLUSION" || true
          echo "Check Run 완료: conclusion=$CONCLUSION"
